apply plugin: 'com.android.application'

android {
    namespace = "space.u2re.cwsp"
    compileSdk = rootProject.ext.compileSdkVersion
    buildFeatures {
        buildConfig true
    }
    defaultConfig {
        applicationId "space.u2re.cwsp"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}

// Mirrors CWSAndroid `attachDebug`: install debug APK then launch on ADB (VS Code Android debugger / cwsp Capacitor).
def cwspDebugAdbIp = "192.168.0.196:5555"

def cwspAdbOutput = { String... adbArgs ->
    def cmd = ["adb"] + adbArgs.toList()
    def pb = new ProcessBuilder(cmd as String[])
    pb.redirectErrorStream(true)
    def proc = pb.start()
    def out = proc.inputStream.getText("UTF-8")
    def code = proc.waitFor()
    [code, out.trim()]
}

def cwspConnectedAdbDevices = {
    def result = cwspAdbOutput("devices")
    if (result[0] != 0) return []
    result[1].split("\n").toList().drop(1).collect { line ->
        def parts = line.trim().split("\\s+")
        if (parts.length >= 2 && parts[1].trim() == "device") parts[0].trim() else null
    }.findAll { it }
}

def cwspResolveAdbSerial = { Project p ->
    def req = p.findProperty("adbSerial")?.toString()?.trim()
    if (req) return req
    def connected = cwspConnectedAdbDevices()
    if (!connected.isEmpty()) return connected[0]
    println "No connected ADB device found, connecting to ${cwspDebugAdbIp}"
    cwspAdbOutput("disconnect", cwspDebugAdbIp)
    cwspAdbOutput("connect", cwspDebugAdbIp)
    connected = cwspConnectedAdbDevices()
    if (connected.isEmpty()) {
        throw new org.gradle.api.GradleException("No ADB device available. Connect one and retry.")
    }
    return connected[0]
}

tasks.register("attachDebug") {
    group = "android"
    description = "Install and launch Capacitor cwsp debug on ADB (optional -PadbSerial= for device)"
    dependsOn("installDebug")
    doLast {
        def adbSerial = cwspResolveAdbSerial(project)
        def launchPackageName = android.defaultConfig.applicationId
        def launch = cwspAdbOutput("-s", adbSerial, "shell", "monkey",
            "-p", launchPackageName.toString(), "-c", "android.intent.category.LAUNCHER", "1")
        if (launch[0] != 0) {
            throw new org.gradle.api.GradleException("adb launch failed with code ${launch[0]}: ${launch[1]}")
        }
        println "Launched ${launchPackageName} on ${adbSerial}"
    }
}
